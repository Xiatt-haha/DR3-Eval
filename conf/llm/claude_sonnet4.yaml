# Claude Sonnet 4 配置
# 继承 default.yaml 的所有配置，只覆盖 model_name
#
# NOTE: API credentials should be set in .env file:
#   - OPENAI_API_KEY (使用与 default.yaml 相同的 API)
#   - OPENAI_BASE_URL (使用与 default.yaml 相同的 base_url)

defaults:
  - default
  - _self_

# 只需要覆盖 model_name，其他配置（provider, base_url 等）都继承自 default.yaml
model_name: "claude_sonnet4"

# Claude 的 tokenizer 对中文编码效率较低，需要更高的 max_tokens 来生成完整的中文报告
# 1 个中文字符在 Claude tokenizer 中约需 2-3 个 tokens
max_tokens: 32000

# Claude 模型不支持同时设置 temperature 和 top_p，只使用 temperature
top_p: null
